<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>exhibition</title>
  <style>
    @font-face {
      font-family: "DS Digi";
      src: url("./DS-DIGIB.TTF") format("truetype");
      font-display: swap;
    }

    :root {
      --bg-top: #eef3ff;
      --bg-bottom: #d6dfef;
      --panel-bg: rgba(12, 22, 40, 0.34);
      --panel-border: rgba(104, 182, 255, 0.26);
      --panel-text: rgba(228, 244, 255, 0.94);
      --panel-accent: #79d3ff;
      --clock-color: rgba(232, 229, 224, 0.72);
      --clock-glow: rgba(0, 0, 0, 0.72);
    }

    html,
    body {
      width: 100%;
      height: 100%;
      margin: 0;
      overflow: hidden;
      background:
        radial-gradient(circle at top left, rgba(255, 255, 255, 0.72), transparent 32%),
        linear-gradient(180deg, var(--bg-top), var(--bg-bottom));
      font-family: "Trebuchet MS", "Segoe UI", sans-serif;
    }

    canvas {
      display: block;
    }

    .controls {
      position: fixed;
      left: 16px;
      top: 16px;
      z-index: 20;
      width: min(320px, calc(100vw - 32px));
      max-height: calc(100vh - 32px);
      overflow: auto;
      padding: 14px 16px;
      color: var(--panel-text);
      background: var(--panel-bg);
      border: 1px solid var(--panel-border);
      box-shadow: 0 18px 50px rgba(10, 28, 56, 0.18), inset 0 0 18px rgba(96, 198, 255, 0.08);
      backdrop-filter: blur(14px);
      -webkit-backdrop-filter: blur(14px);
    }

    .controls label {
      display: block;
      margin-bottom: 12px;
    }

    .row {
      display: flex;
      justify-content: space-between;
      gap: 10px;
      margin-bottom: 5px;
      font-size: 12px;
    }

    .value {
      color: var(--panel-accent);
      font-variant-numeric: tabular-nums;
    }

    .section-title {
      margin: 8px 0 10px;
      font-size: 11px;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      opacity: 0.7;
    }

    .controls input,
    .controls select,
    .controls button,
    .controls textarea {
      width: 100%;
      box-sizing: border-box;
    }

    .controls input[type="range"] {
      accent-color: var(--panel-accent);
    }

    .controls select,
    .controls button,
    .controls textarea {
      color: var(--panel-text);
      background: rgba(8, 24, 48, 0.34);
      border: 1px solid rgba(109, 188, 255, 0.22);
      padding: 7px 8px;
      font: inherit;
    }

    .button-row {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 8px;
      margin-bottom: 8px;
    }

    .controls button {
      cursor: pointer;
    }

    .controls textarea {
      height: 96px;
      resize: vertical;
    }

    .focus-clock {
      position: fixed;
      left: 0;
      top: 0;
      z-index: 50;
      display: none;
      pointer-events: none;
      user-select: none;
      transform: translate(-50%, -100%);
      transform-origin: center bottom;
      text-align: center;
    }

    .focus-clock-time,
    .focus-clock-ampm {
      font-family: "DS Digi", monospace;
      color: var(--clock-color);
      text-shadow: 0 0 12px var(--clock-glow), 0 0 28px rgba(52, 176, 255, 0.28);
      opacity: 0.92;
    }

    .focus-clock-row {
      display: inline-flex;
      align-items: flex-start;
      gap: 0.25em;
      padding: 4px 8px 2px;
      background: rgba(7, 16, 28, 0.18);
      border-radius: 6px;
      backdrop-filter: blur(6px);
      -webkit-backdrop-filter: blur(6px);
    }

    .focus-clock-time {
      font-size: clamp(18px, 2.1vw, 34px);
      line-height: 0.9;
      letter-spacing: 0.08em;
    }

    .focus-clock-ampm {
      padding-top: 0.55em;
      font-size: clamp(9px, 0.9vw, 15px);
      letter-spacing: 0.15em;
    }

    .focus-clock-triangle {
      width: 0;
      height: 0;
      margin: 4px auto 0;
      border-left: 8px solid transparent;
      border-right: 8px solid transparent;
      border-top: 12px solid rgba(255, 58, 58, 0.96);
      filter: drop-shadow(0 0 8px rgba(255, 58, 58, 0.3));
    }

    .controls .row span,
    .controls .value,
    .section-title,
    .controls button,
    .controls select,
    .controls textarea {
      text-shadow: 0 0 8px rgba(73, 215, 255, 0.18);
    }

    .controls input[type="number"] {
      width: 100%;
      box-sizing: border-box;
      color: var(--panel-text);
      background: rgba(8, 24, 48, 0.34);
      border: 1px solid rgba(109, 188, 255, 0.22);
      padding: 7px 8px;
      font: inherit;
      text-shadow: 0 0 8px rgba(73, 215, 255, 0.18);
    }
  </style>
</head>
<body>
<div class="focus-clock" id="focus-clock">
    <div class="focus-clock-row">
      <div class="focus-clock-time" id="focus-clock-time">00:00</div>
      <div class="focus-clock-ampm" id="focus-clock-ampm">AM</div>
    </div>
    <div class="focus-clock-triangle"></div>
  </div>
  <audio id="bgm" src="./orangery-coniferous-forest-142569.mp3" autoplay loop playsinline preload="auto" style="display:none"></audio>
  <script>
    (() => {
      const audio = document.getElementById("bgm");
      if (!audio) return;

      const tryPlay = () => {
        const promise = audio.play();
        if (promise && typeof promise.catch === "function") {
          promise.catch(() => {});
        }
      };

      window.addEventListener("load", tryPlay, { once: true });
      document.addEventListener("pointerdown", tryPlay, { once: true });
      document.addEventListener("keydown", tryPlay, { once: true });
    })();
  </script>

  <script type="importmap">
  {
    "imports": {
      "three": "https://cdn.jsdelivr.net/npm/three@0.169.0/build/three.module.js",
      "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.169.0/examples/jsm/"
    }
  }
  </script>
  <script type="module" src="./exhibition.js"></script>
</body>
</html>
